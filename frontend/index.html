<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow - Distributed App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>TaskFlow</h1>
      <p>Distributed task management application</p>
    </header>

    <section class="card">
      <h2>Create a User</h2>
      <form id="userForm">
        <input type="text" id="userName" placeholder="User name" required />
        <input type="email" id="userEmail" placeholder="User email" required />
        <button type="submit">Add User</button>
      </form>
    </section>

    <section class="card">
      <h2>Create a Task</h2>
      <form id="taskForm">
        <input type="text" id="taskTitle" placeholder="Task title" required />
        <select id="taskStatus">
          <option value="pending">Pending</option>
          <option value="done">Done</option>
        </select>
        <input type="number" id="taskUserId" placeholder="User ID" required />
        <button type="submit">Add Task</button>
      </form>
    </section>

    <div class="grid">
      <section class="card">
        <div class="section-header">
          <h2>Users</h2>
          <button onclick="loadUsers()">Refresh</button>
        </div>
        <div id="usersList" class="list"></div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Tasks</h2>
          <button onclick="loadTasks()">Refresh</button>
        </div>
        <div id="tasksList" class="list"></div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
